repository:
  root: .
  remote: origin
  base_branch: main
  branch_prefix: agentic/issue-
  protected_paths:
    - .github/**
    - agentic_loop_assets/schemas/**

github:
  ready_label: agentic:ready
  demo_label: agentic-demo

codex:
  executable: codex.cmd
  extra_args: []

policy:
  max_review_cycles: 2
  max_findings_per_cycle: 25
  stagnant_cycles: 2
  max_changed_files: 20
  max_diff_lines: 1000

validation:
  commands:
    - python -m pytest
    - python -m agentic_loop validate

synthetic_review:
  enabled: false
  findings: []
